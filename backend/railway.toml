# Railway configuration file for the Team Task Manager monorepo.
#
# Deployment strategy:
#   Service 1 (Backend):  Set Root Directory → /backend in Railway dashboard.
#                          Railway will auto-detect the Dockerfile there.
#   Service 2 (Frontend): Set Root Directory → /frontend in Railway dashboard.
#                          Railway builds via Nixpacks (Vite).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
